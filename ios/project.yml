name: BridgeTracker
options:
  bundleIdPrefix: net.travis-harper.bridgetracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    DEVELOPMENT_TEAM: ""           # set your Apple Developer Team ID
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic

targets:
  BridgeTracker:
    type: application
    platform: iOS
    sources:
      - path: BridgeTracker
      - path: Shared
    resources:
      - path: BridgeTracker/Assets.xcassets
    dependencies:
      - target: BridgeWidgetExtension
    # Debug (local dev) uses the development APNs entitlement + automatic
    # signing. The Release config (CI archive) overrides to manual distribution
    # signing with a production aps-environment file (see configs.Release below).
    entitlements:
      path: BridgeTracker/BridgeTracker.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.travis-harper.bridgetracker
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Brickell Bridge"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_NSSupportsLiveActivitiesFrequentUpdates: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Shows your location relative to the Brickell Avenue Bridge."
        INFOPLIST_KEY_NSUserActivityTypes: "BridgeStatusIntent"
        INFOPLIST_KEY_CFBundleURLTypes_Generation: NO
        # Skips the App Store Connect export compliance prompt. The app only
        # uses standard HTTPS via URLSession (exempt under US export rules).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
      configs:
        # CI archives Release with the stored Apple Distribution cert + App Store
        # profile (durable signing — no per-run certificate churn).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Bridge Tracker App Store"
          CODE_SIGN_ENTITLEMENTS: BridgeTracker/Release.entitlements
    preBuildScripts:
      - name: SwiftLint (optional)
        script: |
          if command -v swiftlint >/dev/null 2>&1; then swiftlint; fi
        basedOnDependencyAnalysis: false

  BridgeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BridgeWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.travis-harper.bridgetracker.widget
        INFOPLIST_FILE: BridgeWidgetExtension/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Bridge Tracker Widget AppStore"

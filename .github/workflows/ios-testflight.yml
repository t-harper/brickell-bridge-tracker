name: iOS to TestFlight

# Builds the iOS app on macos-latest and uploads to App Store Connect →
# TestFlight. From there, internal testers (you, plus anyone you add under
# Users and Access) get the build pushed to their device. External testing
# groups require Apple's beta review (~24h first time, faster on updates).
#
# Required GitHub secrets:
#   APPLE_TEAM_ID       — 10-char Team ID from developer.apple.com → Membership
#   ASC_API_KEY_ID      — 10-char key ID from App Store Connect → Users and Access → Keys
#   ASC_API_ISSUER_ID   — UUID issuer ID from the same page
#   ASC_API_KEY_P8      — full contents of the AuthKey_<KEY_ID>.p8 file (including BEGIN/END lines)
#   APPLE_APP_ID        — numeric App Store Connect app ID (used to deep-link the build in the run summary)
#
# The App Store Connect API key must have App Manager role or higher to upload builds.

on:
  push:
    branches: [main]
    paths: ["ios/**", ".github/workflows/ios-testflight.yml"]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL baked into the build"
        required: true
        default: "https://bridge.travis-harper.net"
        type: string

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      APPLE_APP_ID: ${{ secrets.APPLE_APP_ID }}
      API_BASE_URL: ${{ inputs.api_base_url || 'https://bridge.travis-harper.net' }}
      # TestFlight requires a strictly-increasing build number within a given
      # marketing version. github.run_number is monotonic per workflow file,
      # so reuse across builds is impossible without a manual reset.
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6

      # Apple requires apps to be built with the iOS 26 SDK or later for
      # App Store Connect uploads. The macos-latest runner ships multiple
      # Xcodes; default may be an older one, so pick the newest installed.
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # Secret comes through env so it never appears in the script text
      # (GitHub also masks it in logs, but env-passing is the safer pattern).
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          KEY_DIR=~/.appstoreconnect/private_keys
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # Bake the API URL into a Swift constant. Tried piping via
      # INFOPLIST_KEY_API_BASE_URL → Bundle.main.object(forInfoDictionaryKey:)
      # but Xcode's auto-Info.plist generator only translates that prefix for
      # Apple-recognized keys, so custom keys silently disappear and the app
      # fell through to its localhost fallback on real devices.
      - name: Bake API URL into BuildConfig.swift
        working-directory: ios
        run: |
          cat > Shared/BuildConfig.swift <<EOF
          import Foundation

          enum BuildConfig {
              static let apiBaseURL = "${API_BASE_URL}"
          }
          EOF
          grep apiBaseURL Shared/BuildConfig.swift

      # Durable signing: import the stored Apple Distribution cert + both App
      # Store profiles (app + widget) into a temp keychain. Manual signing reuses
      # this one certificate every run instead of minting a new dev cert.
      - name: Install signing certificate & provisioning profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUILD_PROVISION_PROFILE_WIDGET_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_WIDGET_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KC_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KC_PATH" >/dev/null
          EXISTING=$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')
          security list-keychains -d user -s "$KC_PATH" $EXISTING
          security default-keychain -s "$KC_PATH"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/app.mobileprovision"
          echo -n "$BUILD_PROVISION_PROFILE_WIDGET_BASE64" | base64 --decode > "$PROFILES_DIR/widget.mobileprovision"
          echo "Signing identities available:"
          security find-identity -v -p codesigning "$KC_PATH"

      - name: Build archive
        working-directory: ios
        run: |
          xcodebuild \
            -project BridgeTracker.xcodeproj \
            -scheme BridgeTracker \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/BridgeTracker.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      - name: Export IPA
        working-directory: ios
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.travis-harper.bridgetracker</key>
              <string>Bridge Tracker App Store</string>
              <key>net.travis-harper.bridgetracker.widget</key>
              <string>Bridge Tracker Widget AppStore</string>
            </dict>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/BridgeTracker.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        working-directory: ios
        run: |
          IPA=$(find build/ipa -name '*.ipa' | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA found in build/ipa"
            exit 1
          fi
          SIZE=$(du -h "$IPA" | cut -f1)
          echo "Uploading $IPA ($SIZE) build=$BUILD_NUMBER"

          # altool reads the .p8 from ~/.appstoreconnect/private_keys/ based
          # on the apiKey ID, which we wrote in the "Write API key" step.
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

          ASC_LINK="https://appstoreconnect.apple.com/apps/${APPLE_APP_ID}/testflight/ios"
          {
            echo "## TestFlight upload"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Build number | \`$BUILD_NUMBER\` |"
            echo "| IPA size | $SIZE |"
            echo "| API URL | \`$API_BASE_URL\` |"
            echo "| App Store Connect | [TestFlight builds]($ASC_LINK) |"
            echo ""
            echo "Apple processes the build (~5-15 min for first ingest, faster on subsequent)."
            echo "Once it shows up in App Store Connect → TestFlight → iOS Builds, internal"
            echo "testers can install it from the TestFlight app immediately. External groups"
            echo "need beta review first (24h on the first version, minutes on updates)."
          } >> "$GITHUB_STEP_SUMMARY"

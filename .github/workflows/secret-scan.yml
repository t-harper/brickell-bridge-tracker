name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history rescan catches secrets in commits that pre-date
    # this workflow being added (gitleaks rules also evolve over time).
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          # fetch-depth: 0 pulls full history so scheduled + push runs scan
          # every commit, not just HEAD. PR runs already get the merge ref.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=$(curl -sSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks detect --source . --redact --verbose --no-banner --exit-code 1

      # `--no-git` catches things in the working tree that aren't in git yet
      # (e.g. an unstaged .env). Belt-and-suspenders with `detect`.
      - name: Scan working tree
        run: gitleaks detect --source . --no-git --redact --verbose --no-banner --exit-code 1

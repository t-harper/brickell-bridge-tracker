name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so new CodeQL queries catch issues even on quiet weeks.
    - cron: "0 11 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JS/TS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-and-quality adds quality issues on top of the default
          # security suite; for JS/TS the extra noise is manageable.
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
